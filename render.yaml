services:
  - type: web
    name: groweasy-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false # set to the deployed frontend URL after the frontend is live
      - key: MAX_BODY_SIZE
        value: 15mb
      - key: MAX_ROWS
        value: 50000
      - key: RATE_LIMIT_PER_MINUTE
        value: 20
      - key: LOG_LEVEL
        value: info
      - key: LLM_PROVIDER
        value: mock # switch to "groq" or "openai" once a key is added below
      - key: LLM_REQUEST_TIMEOUT_MS
        value: 30000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
